<!DOCTYPE html>
<html>
<head>
  <title>Challenges</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, updateDoc } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACHSsLJF...",
      authDomain: "maxi-capital.firebaseapp.com",
      projectId: "maxi-capital"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (!user) window.location.href = "login.html";
    });

    window.selectChallenge = async (challenge) => {

      if (!currentUser) {
        alert("Login first");
        return;
      }

      await updateDoc(doc(db, "users", currentUser.uid), {
        challenge,
        progress: 0
      });

      window.location.href = "dashboard.html";
    };
  </script>
</head>

<body>

  <h1>Choose Challenge</h1>

  <button onclick="selectChallenge('$10K')">Start $10K</button>
  <button onclick="selectChallenge('$50K')">Start $50K</button>
  <button onclick="selectChallenge('$100K')">Start $100K</button>

</body>
</html>
