<!DOCTYPE html>
<html>
<head>
  <title>Challenges</title>

  <script type="module">
import { auth, db } from "./firebase.js";
  const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (!user) window.location.href = "login.html";
    });

    window.selectChallenge = async (challenge) => {

      if (!currentUser) {
        alert("Login first");
        return;
      }

      await updateDoc(doc(db, "users", currentUser.uid), {
        challenge,
        progress: 0
      });

      window.location.href = "dashboard.html";
    };
  </script>
</head>

<body>

  <h1>Choose Challenge</h1>

  <button onclick="selectChallenge('$10K')">Start $10K</button>
  <button onclick="selectChallenge('$50K')">Start $50K</button>
  <button onclick="selectChallenge('$100K')">Start $100K</button>

</body>
</html>
