<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenges</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<header class="border-b border-zinc-800 p-4 flex justify-between">
  <h1 class="text-yellow-400 font-bold">Challenges</h1>
  <a href="dashboard.html" class="text-sm hover:text-yellow-400">Dashboard</a>
</header>

<main class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-6">

  <div class="bg-zinc-900 p-6 rounded-xl text-center">
    <h2 class="text-xl font-bold">$1,000 Challenge</h2>
    <p class="text-gray-400 mt-2">Starter</p>
    <p class="text-yellow-400 text-2xl mt-4">$3</p>

    <button onclick="selectChallenge(1000,3)"
      class="mt-4 bg-yellow-400 text-black px-4 py-2 rounded-xl w-full">
      Select
    </button>
  </div>

  <div class="bg-zinc-900 p-6 rounded-xl text-center border border-yellow-400">
    <h2 class="text-xl font-bold">$5,000 Challenge</h2>
    <p class="text-gray-400 mt-2">Pro</p>
    <p class="text-yellow-400 text-2xl mt-4">$19</p>

    <button onclick="selectChallenge(5000,19)"
      class="mt-4 bg-yellow-400 text-black px-4 py-2 rounded-xl w-full">
      Select
    </button>
  </div>

  <div class="bg-zinc-900 p-6 rounded-xl text-center">
    <h2 class="text-xl font-bold">$10,000 Challenge</h2>
    <p class="text-gray-400 mt-2">Elite</p>
    <p class="text-yellow-400 text-2xl mt-4">$49</p>

    <button onclick="selectChallenge(10000,49)"
      class="mt-4 bg-yellow-400 text-black px-4 py-2 rounded-xl w-full">
      Select
    </button>
  </div>

</main>

<script>
function selectChallenge(size, price) {
  localStorage.setItem("activeAccount", JSON.stringify({
    size,
    price,
    status: "unpaid"
  }));

  window.location.href = "payment.html";
}
</script>

</body>
</html>
