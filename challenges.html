<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Challenges</title>

<body style="background:#0a0a0a; color:white; font-family:Arial; padding:40px;">

<h1>Choose Your Challenge</h1>

<!-- CHALLENGES CONTAINER -->
<div id="challenges-container" 
style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px;">

  <!-- $1K -->
  <div style="border:1px solid #333; padding:25px; border-radius:12px; background:#111;">
    <h2>$1,000 Account</h2>
    <p>Price: $3</p>
    <p>Profit target: 8%</p>
    <p>Max drawdown: 5%</p>

    <button onclick="location.href='signup.html?plan=1000'"
      style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;">
      Start Challenge
    </button>
  </div>

  <!-- $5K -->
  <div style="border:1px solid #333; padding:25px; border-radius:12px; background:#111;">
    <h2>$5,000 Account</h2>
    <p>Price: $19</p>
    <p>Profit target: 10%</p>
    <p>Max drawdown: 5%</p>

    <button onclick="location.href='signup.html?plan=5000'"
      style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;">
      Start Challenge
    </button>
  </div>

  <!-- $10K -->
  <div style="border:1px solid #333; padding:25px; border-radius:12px; background:#111;">
    <h2>$10,000 Account</h2>
    <p>Price: $39</p>
    <p>Profit target: 10%</p>
    <p>Max drawdown: 5%</p>

    <button onclick="location.href='signup.html?plan=10000'"
      style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;">
      Start Challenge
    </button>
  </div>

  <!-- $25K -->
  <div style="border:1px solid #333; padding:25px; border-radius:12px; background:#111;">
    <h2>$25,000 Account</h2>
    <p>Price: $79</p>
    <p>Profit target: 10%</p>
    <p>Max drawdown: 5%</p>

    <button onclick="location.href='signup.html?plan=25000'"
      style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;">
      Start Challenge
    </button>
  </div>

</div>

<script>
  const challenges = [
    { name: "$1,000 Account", price: "$3" },
    { name: "$5,000 Account", price: "$19" },
    { name: "$10,000 Account", price: "$39" },
    { name: "$25,000 Account", price: "$79" }
  ];

  console.log("Challenges loaded:", challenges);
