<!DOCTYPE html>
<html>
<head>
  <title>Challenges</title>

  <script type="module">
import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser = null;

onAuthStateChanged(auth, (user) => {

  if (!user) {

    window.location.href = "login.html";
    return;

  }

  currentUser = user;

});

window.selectChallenge = async (challenge) => {

  if (!currentUser) return;

  await updateDoc(doc(db, "users", currentUser.uid), {
    challenge
  });

  window.location.href = "dashboard.html";

};
  </script>
</head>

<body>

  <h1>Choose Challenge</h1>

  <button onclick="selectChallenge('$10K')">Start $10K</button>
  <button onclick="selectChallenge('$50K')">Start $50K</button>
  <button onclick="selectChallenge('$100K')">Start $100K</button>

</body>
</html>
