<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plans | Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-black text-white min-h-screen p-6">

  <h1 class="text-5xl font-bold text-center mb-16">
    Choose Your Plan
  </h1>

  <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-8">

    <div class="glass p-8 rounded-3xl text-center">
      <h2 class="text-3xl font-bold mb-4">Starter</h2>
      <p class="text-5xl font-bold text-yellow-400 mb-6">$50</p>

      <a href="signup.html?plan=50"
        class="block bg-yellow-400 text-black py-4 rounded-xl font-bold hover:bg-yellow-300 transition">
        Select Plan
      </a>
    </div>

    <div class="glass p-8 rounded-3xl text-center border border-yellow-400">
      <h2 class="text-3xl font-bold mb-4">Professional</h2>
      <p class="text-5xl font-bold text-yellow-400 mb-6">$100</p>

      <a href="signup.html?plan=100"
        class="block bg-yellow-400 text-black py-4 rounded-xl font-bold hover:bg-yellow-300 transition">
        Select Plan
      </a>
    </div>

    <div class="glass p-8 rounded-3xl text-center">
      <h2 class="text-3xl font-bold mb-4">Elite</h2>
      <p class="text-5xl font-bold text-yellow-400 mb-6">$250</p>

      <a href="signup.html?plan=250"
        class="block bg-yellow-400 text-black py-4 rounded-xl font-bold hover:bg-yellow-300 transition">
        Select Plan
      </a>
    </div>

  </div>

</body>
</html>
