<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <div class="bg-zinc-900 p-8 rounded-2xl w-full max-w-md space-y-4">

    <h1 class="text-2xl font-bold text-yellow-400 text-center">
      Login
    </h1>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-3 bg-black border border-zinc-700 rounded-xl">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 bg-black border border-zinc-700 rounded-xl">

    <button onclick="login()"
      class="w-full bg-yellow-400 text-black py-3 rounded-xl font-bold hover:bg-yellow-300">

      Login

    </button>

    <p class="text-center text-sm text-gray-400">
      Don’t have an account?
      <a href="signup.html" class="text-yellow-400">Signup</a>
    </p>

  </div>

<script>
function login() {

  fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })

  .then(res => res.json())
  .then(user => {

    if (user.error) {
      alert("Invalid login");
      return;
    }

    localStorage.setItem("user", JSON.stringify(user));

    alert("Login successful");

    window.location.href = "dashboard.html";
  })

  .catch(err => {
    alert("Backend not running or error occurred");
    console.log(err);
  });

}
</script>

</body>
</html>
