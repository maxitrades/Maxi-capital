<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login | Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md glass p-8 rounded-3xl">

    <h1 class="text-3xl font-bold text-yellow-400 mb-6 text-center">
      Login
    </h1>

    <input id="email"
      type="email"
      placeholder="Email"
      class="w-full p-3 mb-4 rounded-xl bg-zinc-900 border border-zinc-700"
    />

    <input id="password"
      type="password"
      placeholder="Password"
      class="w-full p-3 mb-6 rounded-xl bg-zinc-900 border border-zinc-700"
    />

    <button onclick="login()"
      class="w-full bg-yellow-400 text-black font-bold py-3 rounded-xl hover:bg-yellow-300 transition">

      Login
    </button>

    <p id="error" class="text-red-500 mt-4 text-center"></p>

  </div>

  <script>
    function login() {

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");

      // basic validation
      if (!email || !password) {
        error.textContent = "Please fill in all fields";
        return;
      }

      // SIMPLE DEMO AUTH (no backend yet)
      // you can later replace this with Firebase

      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("userEmail", email);

      // redirect to dashboard
      window.location.href = "dashboard.html";
    }

    // auto redirect if already logged in
    if (localStorage.getItem("loggedIn") === "true") {
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
