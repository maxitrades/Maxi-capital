<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
</head>

<body style="background:black;color:white;font-family:Arial;padding:40px">

<h2>Activate Challenge</h2>

<p id="info"></p>

<button onclick="pay()" style="padding:10px 20px;background:gold;border:none;">
  Pay Now (Simulated)
</button>

<script>

const account = JSON.parse(localStorage.getItem("activeAccount"));

document.getElementById("info").innerText =
"Pay $" + account.price + " to activate $" + account.size + " account";

function pay() {
  account.status = "active";

  localStorage.setItem("activeAccount", JSON.stringify(account));
  localStorage.setItem("accountSize", account.size);
  localStorage.setItem("equity", account.size);

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
