<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{ background:#050505; color:white; font-family:Arial; }

    .gold{ color:#d4af37; }

    .glass{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="flex justify-between px-8 py-6 border-b border-white/10">
  <h1>MAXI <span class="gold">CAPITAL</span></h1>

  <div class="flex gap-5 text-sm">
    <a href="index.html">Home</a>
    <a href="challenges.html">challenges</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html">Logout</a>
  </div>
</nav>

<section class="px-8 py-20">

  <h1 class="text-4xl font-bold">Profile</h1>

  <div class="grid md:grid-cols-3 gap-6 mt-10">

    <div class="glass p-6 rounded-2xl">
      <p class="text-gray-400">Email</p>
      <h2 id="email" class="text-lg mt-2">Loading...</h2>
    </div>

    <div class="glass p-6 rounded-2xl">
      <p class="text-gray-400">Plan</p>
      <h2 id="plan" class="text-3xl gold">$0</h2>
    </div>

    <div class="glass p-6 rounded-2xl">
      <p class="text-gray-400">Progress</p>

      <div class="w-full bg-white/10 h-3 rounded-full mt-3">
        <div id="progressBar" class="bg-yellow-400 h-3 rounded-full" style="width:0%"></div>
      </div>

      <p id="progressText" class="text-sm text-gray-400 mt-3">
        0% completed
      </p>

    </div>

  </div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACHSsLJlfFdB44aCLsNKg6yqNMZ39Erwo",
  authDomain: "maxi-capital.firebaseapp.com",
  projectId: "maxi-capital",
  storageBucket: "maxi-capital.firebasestorage.app",
  messagingSenderId: "496545084482",
  appId: "1:496545084482:web:689f942d3d02aec99169db"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("email").textContent = user.email;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {

    const data = snap.data();

    document.getElementById("plan").textContent = "$" + data.plan;

    const progress = data.progress || 0;

    document.getElementById("progressBar").style.width = progress + "%";

    document.getElementById("progressText").textContent =
      progress + "% completed";
  }

});

</script>

</body>
</html>
