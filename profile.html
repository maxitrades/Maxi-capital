<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#050505;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
    }

    .gold{ color:#d4af37; }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .btn-gold{
      background:#d4af37;
      color:black;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="flex justify-between px-8 py-6 border-b border-white/10">
  <h1 class="text-xl font-bold">MAXI <span class="gold">CAPITAL</span></h1>

  <div class="flex gap-6 text-sm">
    <a href="index.html">Home</a>
    <a href="challenges.html">Challenges</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html">Logout</a>
  </div>
</nav>

<section class="px-8 py-20">

  <h1 class="text-4xl font-bold">Profile</h1>

  <div class="grid md:grid-cols-3 gap-6 mt-10">

    <div class="glass p-6 rounded-2xl">
      <p class="text-gray-400">Email</p>
      <h2 id="email" class="text-xl mt-2">Loading...</h2>
    </div>

    <div class="glass p-6 rounded-2xl">
      <p class="text-gray-400">Plan</p>
      <h2 id="plan" class="text-3xl gold mt-2">$0</h2>
    </div>

    <div class="glass p-6 rounded-2xl">
      <p class="text-gray-400">Status</p>
      <h2 class="text-green-400 text-xl mt-2">Active</h2>
    </div>

  </div>

</section>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACHSsLJlfFdB44aCLsNKg6yqNMZ39Erwo",
  authDomain: "maxi-capital.firebaseapp.com",
  projectId: "maxi-capital",
  storageBucket: "maxi-capital.firebasestorage.app",
  messagingSenderId: "496545084482",
  appId: "1:496545084482:web:689f942d3d02aec99169db"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH PROTECTION + DATA LOAD
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("email").textContent = user.email;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    document.getElementById("plan").textContent =
      "$" + snap.data().plan;
  }

});

</script>

</body>
</html>
