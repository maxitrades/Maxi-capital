<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<header class="p-4 border-b border-zinc-800">
  <a href="dashboard.html" class="text-yellow-400">Back</a>
</header>

<main class="max-w-xl mx-auto p-6 space-y-4">

<h1 class="text-2xl font-bold text-yellow-400">Profile</h1>

<input id="name" placeholder="Full Name" class="w-full p-2 bg-zinc-900">
<input id="phone" placeholder="Phone" class="w-full p-2 bg-zinc-900">
<input id="country" placeholder="Country" class="w-full p-2 bg-zinc-900">
<input id="idNumber" placeholder="ID Number" class="w-full p-2 bg-zinc-900">

<button onclick="saveProfile()"
  class="bg-yellow-400 text-black px-4 py-2 rounded-xl">
  Save
</button>

<h2 class="text-xl mt-6">KYC Status:</h2>
<p id="kyc" class="text-yellow-400">Pending</p>

</main>

<script>

document.getElementById("name").value = localStorage.getItem("name") || "";
document.getElementById("phone").value = localStorage.getItem("phone") || "";
document.getElementById("country").value = localStorage.getItem("country") || "";
document.getElementById("idNumber").value = localStorage.getItem("idNumber") || "";

document.getElementById("kyc").innerText =
localStorage.getItem("kyc") || "unverified";

function saveProfile() {
  localStorage.setItem("name", name.value);
  localStorage.setItem("phone", phone.value);
  localStorage.setItem("country", country.value);
  localStorage.setItem("idNumber", idNumber.value);
  localStorage.setItem("kyc", "pending_review");

  alert("Saved");
}

</script>

</body>
</html>
