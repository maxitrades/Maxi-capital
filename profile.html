<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Profile | Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-black text-white min-h-screen">

  <!-- LOGIN CHECK -->
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <!-- HEADER -->
  <header class="border-b border-zinc-800 sticky top-0 bg-black/90 backdrop-blur z-50">

    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex flex-col md:flex-row gap-4 md:justify-between md:items-center">

      <h1 class="text-2xl font-bold text-yellow-400">
        Maxi Capital
      </h1>

      <nav class="flex flex-wrap gap-4 text-sm">

        <a href="dashboard.html" class="hover:text-yellow-400 transition">
          Dashboard
        </a>

        <a href="profile.html" class="text-yellow-400">
          Profile
        </a>

        <a href="challenges.html" class="hover:text-yellow-400 transition">
          Challenges
        </a>

        <a href="contact.html" class="hover:text-yellow-400 transition">
          Support
        </a>

        <button onclick="logout()"
          class="bg-red-500 px-4 py-2 rounded-xl hover:bg-red-400 transition">
          Logout
        </button>

      </nav>

    </div>

  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 md:px-6 py-10">

    <div class="glass p-8 rounded-3xl">

      <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-10">

        <div>
          <h2 class="text-4xl font-bold mb-2">
            Trader Profile
          </h2>

          <p class="text-gray-400">
            Manage your account information and verification status.
          </p>
        </div>

        <!-- KYC STATUS -->
        <div class="bg-yellow-400/10 border border-yellow-400 px-5 py-3 rounded-2xl text-center">

          <p class="text-sm text-gray-400">
            KYC Status
          </p>

          <h3 id="kycStatus" class="text-xl font-bold text-yellow-400">
            Pending
          </h3>

        </div>

      </div>

      <!-- FORM -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- FULL NAME -->
        <div>
          <label class="block mb-2 text-gray-400">
            Full Name
          </label>

          <input
            id="fullName"
            type="text"
            placeholder="Enter full name"
            class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-400"
          />
        </div>

        <!-- EMAIL -->
        <div>
          <label class="block mb-2 text-gray-400">
            Email
          </label>

          <input
            id="email"
            type="email"
            class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-400"
          />
        </div>

        <!-- PHONE -->
        <div>
          <label class="block mb-2 text-gray-400">
            Phone Number
          </label>

          <input
            id="phone"
            type="text"
            placeholder="+254..."
            class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-400"
          />
        </div>

        <!-- COUNTRY -->
        <div>
          <label class="block mb-2 text-gray-400">
            Country
          </label>

          <input
            id="country"
            type="text"
            placeholder="Kenya"
            class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-400"
          />
        </div>

        <!-- ADDRESS -->
        <div class="md:col-span-2">
          <label class="block mb-2 text-gray-400">
            Address
          </label>

          <input
            id="address"
            type="text"
            placeholder="Your address"
            class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-400"
          />
        </div>

        <!-- ID -->
        <div class="md:col-span-2">
          <label class="block mb-2 text-gray-400">
            National ID / Passport Number
          </label>

          <input
            id="identity"
            type="text"
            placeholder="ID Number"
            class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-400"
          />
        </div>

      </div>

      <!-- SAVE -->
      <div class="mt-10">

        <button onclick="saveProfile()"
          class="bg-yellow-400 text-black px-8 py-4 rounded-2xl font-bold hover:bg-yellow-300 transition">

          Save Profile
        </button>

      </div>

    </div>

  </main>

  <!-- SCRIPT -->
  <script>

    // =========================
    // LOAD SAVED DATA
    // =========================
    document.getElementById("email").value =
      localStorage.getItem("userEmail") || "";

    document.getElementById("fullName").value =
      localStorage.getItem("fullName") || "";

    document.getElementById("phone").value =
      localStorage.getItem("phone") || "";

    document.getElementById("country").value =
      localStorage.getItem("country") || "";

    document.getElementById("address").value =
      localStorage.getItem("address") || "";

    document.getElementById("identity").value =
      localStorage.getItem("identity") || "";

    // =========================
    // SAVE PROFILE
    // =========================
    function saveProfile() {

      localStorage.setItem(
        "fullName",
        document.getElementById("fullName").value
      );

      localStorage.setItem(
        "phone",
        document.getElementById("phone").value
      );

      localStorage.setItem(
        "country",
        document.getElementById("country").value
      );

      localStorage.setItem(
        "address",
        document.getElementById("address").value
      );

      localStorage.setItem(
        "identity",
        document.getElementById("identity").value
      );

      alert("Profile saved successfully.");
    }

    // =========================
    // LOGOUT
    // =========================
    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

  </script>

</body>
</html>
