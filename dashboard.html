<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<header class="p-4 border-b border-zinc-800 flex justify-between">
  <h1 class="text-yellow-400">Dashboard</h1>
  <a href="profile.html">Profile</a>
</header>

<main class="p-6 space-y-6">

<h2 id="status" class="text-xl"></h2>

<div>
  <p>Equity: <span id="equity"></span></p>
  <p>Account: <span id="account"></span></p>
</div>

<div id="risk"></div>

</main>

<script>

const activeAccount = JSON.parse(localStorage.getItem("activeAccount"));

if (!activeAccount || activeAccount.status !== "active") {
  window.location.href = "payment.html";
}

let accountSize = activeAccount.size;
let equity = parseFloat(localStorage.getItem("equity")) || accountSize;

let trades = JSON.parse(localStorage.getItem("trades")) || [];
let locked = false;

function checkRules() {

  let profit = ((equity - accountSize) / accountSize) * 100;
  let drawdown = ((accountSize - equity) / accountSize) * 100;

  if (drawdown >= 10) locked = true;

  if (profit >= 8) locked = true;

  document.getElementById("status").innerText =
    locked ? "LOCKED" : "ACTIVE";
}

function update() {
  document.getElementById("equity").innerText = equity;
  document.getElementById("account").innerText = accountSize;

  document.getElementById("risk").innerText =
    "Trades: " + trades.length;
}

checkRules();
update();

</script>

</body>
</html>
