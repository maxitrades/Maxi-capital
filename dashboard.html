<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACHSsLJF...",
      authDomain: "maxi-capital.firebaseapp.com",
      projectId: "maxi-capital"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const snap = await getDoc(doc(db, "users", user.uid));

      if (!snap.exists()) return;

      const data = snap.data();

      document.getElementById("email").innerText = data.email;
      document.getElementById("challenge").innerText = data.challenge || "Not Selected";
      document.getElementById("plan").innerText = "$" + (data.plan || 0);

      if (!data.challenge) {
        document.getElementById("warning").style.display = "block";
      }

    });
  </script>
</head>

<body>
  <h1>Dashboard</h1>

  <p>Email: <span id="email"></span></p>
  <p>Plan: <span id="plan"></span></p>
  <p>Challenge: <span id="challenge"></span></p>

  <div id="warning" style="display:none;color:red;">
    No challenge selected
    <br>
    <a href="challenges.html">Go choose one</a>
  </div>

</body>
</html>
