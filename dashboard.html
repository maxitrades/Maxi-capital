<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
</head>

<body style="background:#0a0a0a; color:white; font-family:Arial; padding:40px;">

<h1>Create Account</h1>

<h2 id="selected-plan">Loading...</h2>

<input id="email" placeholder="Email" style="padding:10px; width:250px;"><br><br>
<input id="password" type="password" placeholder="Password" style="padding:10px; width:250px;"><br><br>

<button id="btn" style="padding:10px 18px; background:gold; border:none;">Create</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "maxi-capital.firebaseapp.com",
  projectId: "maxi-capital",
  storageBucket: "maxi-capital.firebasestorage.app",
  messagingSenderId: "496545084482",
  appId: "1:496545084482:web:689f942d3d02aec99169db"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const plan = new URLSearchParams(location.search).get("plan");
document.getElementById("selected-plan").innerText =
  plan ? "Selected: $" + plan : "No plan";

document.getElementById("btn").onclick = async () => {

  const email = email.value;
  const password = password.value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      email: userCred.user.email,
      plan: plan
    });

    location.href = "dashboard.html";

  } catch (e) {
    document.getElementById("msg").innerText = e.message;
  }

};

</script>

</body>
</html>
