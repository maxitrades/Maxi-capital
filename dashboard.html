<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>

<body style="background:#0a0a0a; color:white; font-family:Arial; margin:0;">

<!-- NAVBAR -->
<nav style="display:flex; justify-content:space-between; align-items:center; padding:20px 40px; border-bottom:1px solid #222;">

  <h2>
    MAXI <span style="color:gold;">CAPITAL</span>
  </h2>

  <div style="display:flex; gap:20px;">
    <a href="index.html" style="color:white; text-decoration:none;">Home</a>
    <a href="challenges.html" style="color:white; text-decoration:none;">Challenges</a>
    <a href="dashboard.html" style="color:gold; text-decoration:none;">Dashboard</a>
  </div>

</nav>

<!-- MAIN DASHBOARD -->
<section style="padding:40px;">

  <h1>Trader Dashboard</h1>

  <p style="color:#aaa;">
    Welcome back, trader.
  </p>

  <!-- ACCOUNT CARD -->
  <div style="background:#111; border:1px solid #333; border-radius:12px; padding:25px; margin-top:30px;">

    <h2>Active Challenge</h2>

    <p>
      <strong>Account Size:</strong>
      <span id="account-size">Loading...</span>
    </p>

    <p><strong>Status:</strong> In Progress</p>
    <p><strong>Profit Target:</strong> 10%</p>
    <p><strong>Max Drawdown:</strong> 5%</p>

  </div>
<button onclick="location.href='challenges.html'"
style="padding:10px 18px; background:red; color:white; border:none; cursor:pointer; margin-top:20px;">
Reset Challenge
</button>
  <!-- STATS -->
  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px; margin-top:30px;">

    <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #333;">
      <h3>Balance</h3>
      <p>$10,240</p>
    </div>

    <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #333;">
      <h3>Profit</h3>
      <p>+$240</p>
    </div>

    <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #333;">
      <h3>Drawdown Left</h3>
      <p>4.2%</p>
    </div>

    <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #333;">
      <h3>Trading Days</h3>
      <p>12 Days</p>
    </div>

  </div>

</section>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACHSsLJFfFdB44aCLsNKg6yqNMZ39Erwo",
  authDomain: "maxi-capital.firebaseapp.com",
  projectId: "maxi-capital",
  storageBucket: "maxi-capital.firebasestorage.app",
  messagingSenderId: "496545084482",
  appId: "1:496545084482:web:689f942d3d02aec99169db",
  measurementId: "G-7LSECL5MWV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const accountSize = document.getElementById("account-size");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    accountSize.textContent = "Not Logged In";
    return;
  }

  try {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      const data = snap.data();

      accountSize.textContent = data.plan
        ? "$" + data.plan + " Account"
        : "No Plan Selected";

    } else {
      accountSize.textContent = "No Data Found";
    }

  } catch (err) {
    accountSize.textContent = "Error Loading Data";
  }

});

</script>
 

</body>
</html>
