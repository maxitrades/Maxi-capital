<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dashboard | Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-black text-white min-h-screen">

  <!-- LOGIN CHECK -->
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <!-- NAVBAR -->
  <header class="border-b border-zinc-800 sticky top-0 bg-black/90 backdrop-blur z-50">

    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center">

      <h1 class="text-2xl font-bold text-yellow-400">
        Maxi Capital
      </h1>

      <nav class="flex gap-4 text-sm items-center">

        <a href="dashboard.html" class="text-yellow-400">Dashboard</a>
        <a href="profile.html" class="hover:text-yellow-400">Profile</a>
        <a href="challenges.html" class="hover:text-yellow-400">Challenges</a>
        <a href="faq.html" class="hover:text-yellow-400">FAQ</a>
        <a href="contact.html" class="hover:text-yellow-400">Support</a>

        <span class="text-gray-400">
          <span id="userEmail"></span>
        </span>

        <button onclick="logout()"
          class="bg-red-500 px-4 py-2 rounded-xl hover:bg-red-400">
          Logout
        </button>

      </nav>

    </div>

  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 md:px-6 py-10 space-y-8">

    <!-- HEADER -->
    <section class="glass p-8 rounded-3xl">

      <h2 class="text-3xl font-bold mb-2">
        Trading Dashboard
      </h2>

      <p class="text-gray-400">
        Monitor your challenge performance and risk status.
      </p>

    </section>

    <!-- CORE STATS -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Account Size</p>
        <h3 id="accountSizeText" class="text-4xl font-bold text-yellow-400">$0</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Equity</p>
        <h3 id="equity" class="text-4xl font-bold text-green-400">$0</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Status</p>
        <h3 id="phase" class="text-3xl font-bold text-blue-400">Active</h3>
      </div>

    </section>

    <!-- ANALYTICS -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Win Rate</p>
        <h3 id="winRate" class="text-3xl font-bold text-yellow-400">0%</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Trades</p>
        <h3 id="totalTrades" class="text-3xl font-bold text-blue-400">0</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Drawdown</p>
        <h3 id="drawdown" class="text-3xl font-bold text-red-400">0%</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Risk</p>
        <h3 id="riskScore" class="text-3xl font-bold text-green-400">Low</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Daily PnL</p>
        <h3 id="dailyPnL" class="text-3xl font-bold text-yellow-400">$0</h3>
      </div>

    </section>

    <!-- PROGRESS -->
    <section class="glass p-8 rounded-3xl">

      <div class="flex justify-between mb-4">
        <h3 class="text-2xl font-bold text-yellow-400">
          Profit Progress
        </h3>
        <span class="text-gray-400">Target: 8%</span>
      </div>

      <div class="w-full bg-zinc-800 h-5 rounded-full overflow-hidden">
        <div id="progressBar" class="bg-yellow-400 h-5" style="width:0%"></div>
      </div>

      <p class="mt-4 text-gray-400">
        Progress:
        <span id="progressText" class="text-yellow-400 font-bold">0%</span>
      </p>

    </section>

    <!-- TRADE HISTORY ONLY (NO SIMULATOR) -->
    <section class="glass p-8 rounded-3xl">

      <h2 class="text-2xl font-bold mb-6 text-yellow-400">
        Trade History
      </h2>

      <div id="tradeList" class="space-y-3"></div>

    </section>

  </main>

  <!-- SCRIPT -->
  <script>
     const challenge =
     JSON.parse(localStorage.getItem("selectedChallenge"));

     if (challenge) {
      document.getElementById("accountSizeText").textContent =
    "$" + challenge.size;
}   
    // USER
    const email = localStorage.getItem("userEmail");
    document.getElementById("userEmail").textContent = email || "Trader";

    // STATE
    const accountSize =
      parseFloat(localStorage.getItem("accountSize")) || 10000;

    let equity =
      parseFloat(localStorage.getItem("equity")) || accountSize;

    let trades =
      JSON.parse(localStorage.getItem("trades")) || [];

    let locked =
      localStorage.getItem("locked") === "true";

    let dailyStart =
      parseFloat(localStorage.getItem("dailyStart")) || accountSize;

    // RESET DAILY
    let today = new Date().toDateString();
    if (localStorage.getItem("today") !== today) {
      dailyStart = equity;
      localStorage.setItem("today", today);
      localStorage.setItem("dailyStart", dailyStart);
    }

    document.getElementById("accountSizeText").textContent =
      "$" + accountSize;

    // SAVE
    function save() {
      localStorage.setItem("equity", equity);
      localStorage.setItem("trades", JSON.stringify(trades));
      localStorage.setItem("locked", locked);
      localStorage.setItem("dailyStart", dailyStart);
    }

    // RISK RULES
    function checkRules() {

      let profit = ((equity - accountSize) / accountSize) * 100;
      let drawdown = ((accountSize - equity) / accountSize) * 100;
      let dailyLoss = ((dailyStart - equity) / accountSize) * 100;

      if (drawdown >= 10) {
        locked = true;
        document.getElementById("phase").textContent = "BLOWN ACCOUNT ❌";
      }

      if (dailyLoss >= 5) {
        locked = true;
        document.getElementById("phase").textContent = "DAILY LIMIT HIT ❌";
      }

      if (profit >= 8) {
        locked = true;
        document.getElementById("phase").textContent = "CHALLENGE PASSED ✔";
        document.getElementById("phase").classList.add("text-green-400");
      }
    }

    // UPDATE UI
    function updateUI() {

      let profit = ((equity - accountSize) / accountSize) * 100;
      let drawdown = ((accountSize - equity) / accountSize) * 100;
      let dailyPnL = equity - dailyStart;

      let wins = trades.filter(t => t.pnl > 0).length;
      let total = trades.length;
      let winRate = total ? (wins / total) * 100 : 0;

      let risk = "Low";
      if (drawdown > 3) risk = "Medium";
      if (drawdown > 6) risk = "High";

      document.getElementById("equity").textContent = "$" + equity.toFixed(2);
      document.getElementById("progressText").textContent = profit.toFixed(2) + "%";
      document.getElementById("progressBar").style.width = Math.min(Math.max((profit / 8) * 100, 0), 100) + "%";

      document.getElementById("winRate").textContent = winRate.toFixed(0) + "%";
      document.getElementById("totalTrades").textContent = total;
      document.getElementById("drawdown").textContent = drawdown.toFixed(2) + "%";
      document.getElementById("riskScore").textContent = risk;
      document.getElementById("dailyPnL").textContent = "$" + dailyPnL.toFixed(2);

    }

    // RENDER
    function renderTrades() {

      let container = document.getElementById("tradeList");
      container.innerHTML = "";

      trades.slice().reverse().forEach(t => {

        let color = t.pnl >= 0 ? "text-green-400" : "text-red-400";

        container.innerHTML += `
          <div class="flex justify-between p-4 bg-zinc-900 border border-zinc-800 rounded-xl">

            <div>
              <p class="font-bold">${t.type}</p>
              <p class="text-xs text-gray-500">${t.time}</p>
            </div>

            <div class="${color} font-bold">
              ${t.pnl >= 0 ? "+" : ""}${t.pnl.toFixed(2)}
            </div>

          </div>
        `;
      });
    }

    // INIT
    checkRules();
    updateUI();
    renderTrades();

    // LOGOUT
    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

  </script>

</body>
</html>
