<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Maxi Capital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- HEADER -->
<header class="border-b border-zinc-800">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">

    <h1 class="text-xl font-bold text-yellow-400">
      Maxi Capital
    </h1>

    <button onclick="logout()" class="text-sm text-red-400">
      Logout
    </button>

  </div>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto px-6 py-10 space-y-6">

  <div class="bg-zinc-900 p-6 rounded-2xl">
    <p class="text-gray-400">Logged in as</p>
    <h2 id="userEmail" class="text-xl font-bold text-yellow-400"></h2>
  </div>

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-zinc-900 p-6 rounded-2xl">
      <p class="text-gray-400">Account Status</p>
      <h3 id="status" class="text-2xl font-bold">Loading...</h3>
    </div>

    <div class="bg-zinc-900 p-6 rounded-2xl">
      <p class="text-gray-400">Account Size</p>
      <h3 id="accountSize" class="text-2xl font-bold">$0</h3>
    </div>

  </div>

</main>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "login.html";
}

// show email
document.getElementById("userEmail").textContent = user.email;

// fetch account from backend
fetch(`http://localhost:3000/account/${user.id}`)
.then(res => res.json())
.then(account => {

  if (!account) {
    document.getElementById("status").textContent = "No Challenge Selected";
    return;
  }

  document.getElementById("status").textContent = account.status;
  document.getElementById("accountSize").textContent = "$" + account.size;

});

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

</script>

</body>
</html>
