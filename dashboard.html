<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dashboard | Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-black text-white min-h-screen">

  <!-- LOGIN GUARD -->
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <!-- HEADER -->
  <header class="border-b border-zinc-800 px-6 py-4 flex justify-between items-center">

    <h1 class="text-2xl font-bold text-yellow-400">
      Maxi Capital Dashboard
    </h1>

    <button onclick="logout()"
      class="bg-red-500 px-4 py-2 rounded-xl hover:bg-red-400 transition">
      Logout
    </button>

  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto p-6 space-y-6">

    <!-- USER INFO -->
    <div class="glass p-8 rounded-3xl">

      <h2 class="text-3xl font-bold mb-2">
        Welcome Trader 👋
      </h2>

      <p class="text-gray-400">
        Account: <span id="userEmail" class="text-yellow-400"></span>
      </p>

    </div>

    <!-- METRICS -->
    <div class="grid md:grid-cols-3 gap-6">

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Account Size</p>
        <h3 class="text-3xl font-bold text-yellow-400" id="accountSizeText">$0</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Current Equity</p>
        <h3 class="text-3xl font-bold text-green-400" id="equity">$0</h3>
      </div>

      <div class="glass p-6 rounded-3xl">
        <p class="text-gray-400">Phase</p>
        <h3 class="text-3xl font-bold text-blue-400" id="phase">Phase 1</h3>
      </div>

    </div>

    <!-- PROGRESS -->
    <div class="glass p-8 rounded-3xl">

      <h3 class="text-xl font-bold mb-4 text-yellow-400">
        Profit Progress (Target: 8%)
      </h3>

      <div class="w-full bg-zinc-800 rounded-full h-4">
        <div id="progressBar"
          class="bg-yellow-400 h-4 rounded-full"
          style="width: 0%;">
        </div>
      </div>

      <p class="text-gray-400 mt-3">
        Current: <span id="progressText">0%</span>
      </p>

    </div>

    <!-- TRADE PANEL -->
    <div class="glass p-8 rounded-3xl">

      <h2 class="text-2xl font-bold text-yellow-400 mb-4">
        Trade Simulator
      </h2>

      <div class="flex gap-4 mb-6">

        <button onclick="openTrade('BUY')"
          class="bg-green-500 px-6 py-3 rounded-xl font-bold hover:bg-green-400">
          BUY
        </button>

        <button onclick="openTrade('SELL')"
          class="bg-red-500 px-6 py-3 rounded-xl font-bold hover:bg-red-400">
          SELL
        </button>

      </div>

      <h3 class="text-lg font-bold mb-2">Trade History</h3>
      <div id="tradeList" class="text-sm text-gray-300 space-y-2"></div>

    </div>

  </main>

  <script>

    // =========================
    // USER
    // =========================
    const email = localStorage.getItem("userEmail");
    document.getElementById("userEmail").textContent = email || "Guest";

    // =========================
    // ACCOUNT (FROM CHALLENGE)
    // =========================
    const accountSize = parseFloat(localStorage.getItem("accountSize")) || 10000;

    let equity = accountSize;
    let trades = [];

    // show account size
    document.getElementById("accountSizeText").textContent = "$" + accountSize;

    const equityEl = document.getElementById("equity");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const phaseEl = document.getElementById("phase");

    // =========================
    // UPDATE UI
    // =========================
    function updateUI() {

      let profitPercent = ((equity - accountSize) / accountSize) * 100;

      equityEl.textContent = "$" + equity.toFixed(2);
      progressText.textContent = profitPercent.toFixed(2) + "%";

      let progress = (profitPercent / 8) * 100;
      progressBar.style.width = Math.min(Math.max(progress, 0), 100) + "%";

      if (profitPercent >= 8) {
        phaseEl.textContent = "Phase Completed ✔";
        phaseEl.classList.add("text-green-400");
      } else {
        phaseEl.textContent = "Phase 1";
        phaseEl.classList.remove("text-green-400");
      }
    }

    // =========================
    // TRADE SYSTEM
    // =========================
    function openTrade(type) {

      let risk = accountSize * 0.005; // 0.5% risk per trade
      let result = Math.random();

      let pnl = result > 0.5 ? risk : -risk;

      equity += pnl;

      trades.push({ type, pnl });

      updateUI();
      renderTrades();
    }

    // =========================
    // TRADE HISTORY
    // =========================
    function renderTrades() {

      let container = document.getElementById("tradeList");
      container.innerHTML = "";

      trades.slice().reverse().forEach(t => {

        let color = t.pnl >= 0 ? "text-green-400" : "text-red-400";

        container.innerHTML += `
          <div class="flex justify-between border-b border-zinc-800 py-1">
            <span>${t.type}</span>
            <span class="${color}">
              ${t.pnl >= 0 ? "+" : ""}${t.pnl.toFixed(2)}
            </span>
          </div>
        `;
      });
    }

    // =========================
    // LOGOUT
    // =========================
    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    // INIT
    updateUI();

  </script>

</body>
</html>
