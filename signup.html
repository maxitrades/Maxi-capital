<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
</head>

<body style="background:#0a0a0a; color:white; font-family:Arial; padding:40px;">

<h1>Sign Up</h1>

<h2 id="selected-plan">Selected Plan: Loading...</h2>

<form>
  <input type="email" placeholder="Email" style="padding:10px; margin:10px 0;"><br>
  <input type="password" placeholder="Password" style="padding:10px; margin:10px 0;"><br>

  <button type="button"
    onclick="location.href='index.html'"
    style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;">
    Create Account
  </button>
</form>

<br>
<a href="index.html" style="color:gold;">Back Home</a>

<script>
  const params = new URLSearchParams(window.location.search);
  const plan = params.get("plan");

  const display = document.getElementById("selected-plan");

  if (plan) {
    display.textContent = "Selected Plan: $" + plan;
  } else {
    display.textContent = "Selected Plan: None";
  }
</script>

</body>
</html>
