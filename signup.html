<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup | Maxi Capital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <div class="bg-zinc-900 p-8 rounded-2xl w-full max-w-md space-y-4">

    <h1 class="text-2xl font-bold text-yellow-400 text-center">
      Create Account
    </h1>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-3 bg-black border border-zinc-700 rounded-xl">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 bg-black border border-zinc-700 rounded-xl">

    <button onclick="signup()"
      class="w-full bg-yellow-400 text-black py-3 rounded-xl font-bold hover:bg-yellow-300">

      Sign Up

    </button>

    <p class="text-center text-sm text-gray-400">
      Already have an account?
      <a href="login.html" class="text-yellow-400">Login</a>
    </p>

  </div>

<script>
function signup() {

  fetch("http://localhost:3000/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })

  .then(res => res.json())
  .then(data => {

    alert("Account created successfully");

    window.location.href = "login.html";
  })

  .catch(err => {
    alert("Signup failed");
    console.log(err);
  });

}
</script>

</body>
</html>
