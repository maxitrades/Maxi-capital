<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
</head>

<body style="background:#0a0a0a; color:white; font-family:Arial; padding:40px;">

<h1>Create Account</h1>

<h2 id="selected-plan">Selected Plan: Loading...</h2>

<input
  type="email"
  id="email"
  placeholder="Email"
  style="padding:10px; margin:10px 0; width:250px;"
>
<br>

<input
  type="password"
  id="password"
  placeholder="Password"
  style="padding:10px; margin:10px 0; width:250px;"
>
<br>

<button
  id="signup-btn"
  style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;"
>
  Create Account
</button>

<p id="message"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACHSsLJFfFdB44aCLsNKg6yqNMZ39Erwo",
  authDomain: "maxi-capital.firebaseapp.com",
  projectId: "maxi-capital",
  storageBucket: "maxi-capital.firebasestorage.app",
  messagingSenderId: "496545084482",
  appId: "1:496545084482:web:689f942d3d02aec99169db",
  measurementId: "G-7LSECL5MWV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// show selected plan
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

const display = document.getElementById("selected-plan");

display.textContent = plan 
  ? "Selected Plan: $" + plan 
  : "Selected Plan: None";

const signupBtn = document.getElementById("signup-btn");

signupBtn.addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    // save user + plan in Firestore
    await setDoc(doc(db, "users", userCredential.user.uid), {
      email: userCredential.user.email,
      plan: plan || "none",
      createdAt: new Date().toISOString()
    });

    document.getElementById("message").textContent =
      "Account created successfully!";

    // go to dashboard
    window.location.href = "dashboard.html";

  } catch (error) {

    document.getElementById("message").textContent =
      error.message;

  }

});

</script>

</body>
</html>
