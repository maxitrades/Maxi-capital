<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Signup | Maxi Capital</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl shadow-2xl border border-zinc-800">

    <h1 class="text-4xl font-bold mb-2 text-center">
      Create Account
    </h1>

    <p class="text-gray-400 text-center mb-6">
      Join Maxi Capital
    </p>

    <div class="bg-zinc-800 p-4 rounded-xl mb-6 text-center">
      <h2 id="selected-plan" class="text-xl font-semibold text-yellow-400">
        Selected Plan: Loading...
      </h2>
    </div>

    <form id="signupForm">

      <div class="mb-4">
        <label class="block mb-2 text-sm text-gray-300">
          Email
        </label>

        <input
          id="email"
          type="email"
          placeholder="Enter your email"
          class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-yellow-400 text-white"
          required
        />
      </div>

      <div class="mb-4">
        <label class="block mb-2 text-sm text-gray-300">
          Password
        </label>

        <input
          id="password"
          type="password"
          placeholder="Enter your password"
          class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-yellow-400 text-white"
          required
        />
      </div>

      <div class="mb-6">
        <label class="block mb-2 text-sm text-gray-300">
          Confirm Password
        </label>

        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm password"
          class="w-full p-3 rounded-xl bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-yellow-400 text-white"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-3 rounded-xl transition duration-300"
      >
        Create Account
      </button>

    </form>

    <p class="text-center text-gray-400 mt-6">
      Already have an account?

      <a href="login.html" class="text-yellow-400 hover:text-yellow-300">
        Login
      </a>
    </p>

    <div class="mt-8 border-t border-zinc-800 pt-6 space-y-4">

      <div class="bg-zinc-800 p-4 rounded-2xl flex items-center gap-4">
        <div class="text-3xl">📧</div>

        <div>
          <p class="text-gray-400 text-sm">
            Email
          </p>

          <h4 class="text-lg font-semibold">
            maxicapital@gmail.com
          </h4>
        </div>
      </div>

      <div class="bg-zinc-800 p-4 rounded-2xl flex items-center gap-4">
        <div class="text-3xl">📱</div>

        <div>
          <p class="text-gray-400 text-sm">
            Contact
          </p>

          <h4 class="text-lg font-semibold">
            +254 718828633
          </h4>
        </div>
      </div>

      <div class="bg-zinc-800 p-4 rounded-2xl flex items-center gap-4">
        <div class="text-3xl">📸</div>

        <div>
          <p class="text-gray-400 text-sm">
            Instagram
          </p>

          <a
            href="https://www.instagram.com/maxi.trades/"
            target="_blank"
            class="text-lg font-semibold text-pink-400 hover:text-pink-300 transition"
          >
            @maxi.trades
          </a>
        </div>
      </div>

    </div>

    <div class="text-center mt-6">
      <a href="index.html" class="text-yellow-400 hover:text-yellow-300">
        ← Back Home
      </a>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan");

    const display = document.getElementById("selected-plan");

    if (plan) {
      display.textContent = "Selected Plan: $" + plan;
    } else {
      display.textContent = "Selected Plan: None";
    }

    document
      .getElementById("signupForm")
      .addEventListener("submit", function(event) {

      event.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword =
        document.getElementById("confirmPassword").value;

      if(password.length < 6){
        alert("Password must be at least 6 characters.");
        return;
      }

      if(password !== confirmPassword){
        alert("Passwords do not match.");
        return;
      }

      alert("Account created successfully!");

      window.location.href =
        "dashboard.html" + window.location.search;
    });
  </script>

</body>
</html>
