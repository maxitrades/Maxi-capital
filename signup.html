<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
</head>

<body style="background:#0a0a0a; color:white; font-family:Arial; padding:40px;">

<h1>Create Account</h1>

<h2 id="selected-plan">Selected Plan: Loading...</h2>

<input
  type="email"
  id="email"
  placeholder="Email"
  style="padding:10px; margin:10px 0; width:250px;"
>
<br>

<input
  type="password"
  id="password"
  placeholder="Password"
  style="padding:10px; margin:10px 0; width:250px;"
>
<br>

<button
  id="signup-btn"
  style="padding:10px 18px; background:gold; border:none; cursor:pointer; margin-top:10px;"
>
  Create Account
</button>

<p id="message"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyACHSsLJlfFdB44aCLsNKg6yqNMZ39Erwo",
  authDomain: "maxi-capital.firebaseapp.com",
  projectId: "maxi-capital",
  storageBucket: "maxi-capital.firebasestorage.app",
  messagingSenderId: "496545084482",
  appId: "1:496545084482:web:689f942d3d02aec99169db",
  measurementId: "G-7LSECL5MWV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

const display = document.getElementById("selected-plan");

if (plan) {
  display.textContent = "Selected Plan: $" + plan;
} else {
  display.textContent = "Selected Plan: None";
}

const signupBtn = document.getElementById("signup-btn");

signupBtn.addEventListener("click", () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)

    .then((userCredential) => {

      document.getElementById("message").textContent =
        "Account created successfully!";

      window.location.href =
        "dashboard.html" + window.location.search;

    })

    .catch((error) => {

      document.getElementById("message").textContent =
        error.message;

    });

});

</script>

</body>
</html>
